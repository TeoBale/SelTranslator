name: macOS Swift

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (SwiftPM)
        run: swift build -v

      - name: Run Tests
        run: swift test -v
